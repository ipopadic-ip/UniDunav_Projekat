<div class="obavestenja-wrapper">
  <div class="container">
    <div class="header">
      <h2>Obaveštenja</h2>
      <button class="btn-add" (click)="dodajObavestenje()">Dodaj novo obaveštenje</button>
    </div>

    <div *ngFor="let obavestenje of obavestenja" class="card">
      <h3><strong>Predmet:</strong> {{ obavestenje.predmetNaziv }}</h3>
      <p>{{ obavestenje.tekst }}</p>
      <p><strong>Datum:</strong> {{ obavestenje.datum | date: 'dd.MM.yyyy' }}</p>
      <div class="card-footer">
        <button class="btn-edit" (click)="izmeniObavestenje(obavestenje)">Izmeni</button>
      </div>
    </div>
  </div>
</div>
